services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminadminadmin
      - DOCKER_INFLUXDB_INIT_ORG=oncovax
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=dev-token-change-me
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: oncovax-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=oncovax
      - MONGO_COLLECTION=audit_events
    restart: unless-stopped
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
  nodered:
    image: nodered/node-red:3.1
    container_name: nodered
    ports:
      - "1880:1880"
    environment:
      - TZ=UTC
    volumes:
      - nodered_data:/data
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb

  simulator:
    build:
      context: ..
      dockerfile: services/simulator/Dockerfile
    container_name: oncovax-simulator
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=oncovax/telemetry/simulator
      - SIM_RUNTIME_CONTROL_TOPIC=oncovax/demo/internal/simulator/runtime/control
    restart: unless-stopped
    depends_on:
      - mosquitto

  orchestration-adapter:
    build:
      context: ..
      dockerfile: services/orchestration_adapter/Dockerfile
    container_name: oncovax-orchestration-adapter
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ORCHESTRATION_STATUS_TOPIC=oncovax/demo/orchestration/status
      - SIM_RUNTIME_CONTROL_TOPIC=oncovax/demo/internal/simulator/runtime/control
    restart: unless-stopped
    depends_on:
      - mosquitto

  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=adminadminadmin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - influxdb

volumes:
  influxdb_data:
  mongodb_data:
  nodered_data:
  grafana_data:
