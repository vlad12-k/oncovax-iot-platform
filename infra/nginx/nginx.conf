limit_req_zone $binary_remote_addr zone=oncovax_general_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=oncovax_write_limit:10m rate=3r/m;

server {
    listen 80;
    server_name oncovax.live www.oncovax.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name oncovax.live www.oncovax.live;

    ssl_certificate     /etc/letsencrypt/live/oncovax.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oncovax.live/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 1m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location = /public-health {
        auth_basic off;

        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
    }

    location ~ ^/alerts/.*/acknowledge$ {
        auth_basic "Restricted OncoVax";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        limit_req zone=oncovax_write_limit burst=5 nodelay;

        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        auth_basic "Restricted OncoVax";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

        limit_req zone=oncovax_general_limit burst=20 nodelay;

        proxy_pass         http://api:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name grafana.oncovax.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name grafana.oncovax.live;

    ssl_certificate     /etc/letsencrypt/live/grafana.oncovax.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.oncovax.live/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    auth_basic "Restricted Access";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd;

    location / {
        proxy_pass http://grafana:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

