# OncoVax IoT Platform – Base Docker Compose Configuration
# This file defines the core services shared across environments.
# For local development (including Grafana and Node-RED), use:
#   docker compose -f infra/docker-compose.dev.yml up -d
# For a production-like deployment, see infra/docker-compose.prod.yml

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    env_file:
      - .env
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: oncovax-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: oncovax-worker
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - mosquitto
      - influxdb
      - mongodb

volumes:
  influxdb_data:
  mongodb_data:
