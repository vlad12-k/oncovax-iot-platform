# OncoVax IoT Platform – Production-like Docker Compose
#
# Intended for use on a DigitalOcean Droplet or similar Linux host.
# Differences from docker-compose.dev.yml:
#   - Grafana and Node-RED are NOT included (use dev stack for those)
#   - nginx reverse proxy added (TLS-ready)
#   - all credentials via env_file only (no hardcoded values)
#   - API port not directly exposed (nginx handles ingress)
#   - restart: always used for resilient restarts
#
# Prerequisites:
#   1. Copy infra/.env.example to infra/.env and fill real values
#   2. Provision TLS certificates (see docs/DEPLOYMENT.md)
#   3. Update infra/nginx/nginx.conf with your domain name

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    expose:
      - "1883"
    restart: always

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    expose:
      - "8086"
    env_file:
      - .env
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: always

  mongodb:
    image: mongo:7
    container_name: mongodb
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: oncovax-worker
    env_file:
      - .env
    restart: always
    depends_on:
      - mosquitto
      - influxdb
      - mongodb


  orchestration-adapter:
    build:
      context: ..
      dockerfile: services/orchestration_adapter/Dockerfile
    container_name: oncovax-orchestration-adapter
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - ORCHESTRATION_STATUS_TOPIC=oncovax/demo/orchestration/status
      - SIM_RUNTIME_CONTROL_TOPIC=oncovax/demo/internal/simulator/runtime/control
    restart: always
    depends_on:
      - mosquitto

  simulator:
    build:
      context: ..
      dockerfile: services/simulator/Dockerfile
    container_name: oncovax-simulator
    env_file:
      - .env
    restart: always
    depends_on:
      - mosquitto

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: oncovax-api
    expose:
      - "8000"
    env_file:
      - .env
    restart: always
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s


  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    env_file:
      - .env
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: always
    depends_on:
      - influxdb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
  nginx:
    image: nginx:1.27-alpine
    container_name: oncovax-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/conf.d/.htpasswd:ro
      # Mount TLS certificates from the host.
      # Provision via Let's Encrypt (certbot) before starting.
      # See docs/DEPLOYMENT.md for instructions.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: always
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Host: oncovax.live' http://127.0.0.1/public-health | grep -q '{\"status\":\"ok\"}'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mosquitto_data:
  influxdb_data:
  mongodb_data:
  grafana_data:
