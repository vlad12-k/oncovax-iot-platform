apiVersion: 1

datasources:
  - name: InfluxDB
    uid: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: oncovax
      defaultBucket: telemetry
      tlsSkipVerify: true
    secureJsonData:
      token: ${INFLUX_TOKEN}
