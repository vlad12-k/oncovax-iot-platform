name: CI (sanity)

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic repo checks
        run: |
          test -f README.md
          test -f SECURITY.md
          test -d docs
          test -d infra
