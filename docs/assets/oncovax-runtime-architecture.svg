<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="900" viewBox="0 0 1460 900" role="img" aria-labelledby="title desc">
  <title id="title">OncoVax Runtime Service Architecture</title>
  <desc id="desc">Runtime architecture showing simulator and orchestration adapter through MQTT to worker, persistence to InfluxDB and MongoDB, API/dashboard and Grafana behind nginx ingress, with public-safe and protected route boundaries.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .host { fill: #f8fafc; stroke: #475569; stroke-width: 2; stroke-dasharray: 8 6; }
      .edge { fill: #fefce8; stroke: #a16207; stroke-width: 1.5; }
      .svc { fill: #f1f5f9; stroke: #475569; stroke-width: 1.5; }
      .store { fill: #eef2ff; stroke: #3730a3; stroke-width: 1.5; }
      .public { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; }
      .protected { fill: #fff7ed; stroke: #c2410c; stroke-width: 1.5; }
      .note { fill: #f9fafb; stroke: #9ca3af; stroke-width: 1.2; stroke-dasharray: 4 3; }
      .title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 600 17px Arial, sans-serif; fill: #0f172a; }
      .text { font: 14px Arial, sans-serif; fill: #0f172a; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .legend { font: 13px Arial, sans-serif; fill: #111827; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1460" height="900" />
  <text class="title" x="24" y="38">OncoVax Runtime / Service Architecture</text>

  <rect class="host" x="260" y="80" width="1170" height="760" rx="12" ry="12" />
  <text class="h2" x="282" y="108">Runtime boundary (dev and production-like service topology)</text>

  <rect class="edge" x="290" y="128" width="1110" height="72" rx="10" ry="10" />
  <text class="h2" x="314" y="156">Runtime edge via nginx ingress (production-like mode)</text>
  <text class="small" x="314" y="177">Public-safe route and protected operational surfaces are separated at ingress</text>

  <rect class="svc" x="330" y="250" width="190" height="88" rx="10" ry="10" />
  <text class="h2" x="358" y="283">Simulator</text>
  <text class="small" x="347" y="306">Publishes telemetry events</text>

  <rect class="svc" x="560" y="250" width="215" height="88" rx="10" ry="10" />
  <text class="h2" x="584" y="283">Orchestration adapter</text>
  <text class="small" x="579" y="306">Runtime-control topic bridge</text>

  <rect class="svc" x="820" y="250" width="205" height="88" rx="10" ry="10" />
  <text class="h2" x="862" y="283">Mosquitto</text>
  <text class="small" x="853" y="306">MQTT transport</text>

  <rect class="svc" x="1070" y="250" width="205" height="88" rx="10" ry="10" />
  <text class="h2" x="1113" y="283">Worker</text>
  <text class="small" x="1087" y="306">Validation + thresholds</text>

  <rect class="store" x="1000" y="400" width="275" height="112" rx="10" ry="10" />
  <text class="h2" x="1102" y="436">InfluxDB</text>
  <text class="small" x="1028" y="460">Telemetry + alert-series time-series</text>

  <rect class="store" x="1290" y="400" width="120" height="112" rx="10" ry="10" />
  <text class="h2" x="1307" y="436">MongoDB</text>
  <text class="small" x="1298" y="460">Operational</text>
  <text class="small" x="1300" y="478">lifecycle/audit</text>

  <rect class="svc" x="650" y="560" width="235" height="102" rx="10" ry="10" />
  <text class="h2" x="691" y="595">API + dashboard</text>
  <text class="small" x="669" y="619">Operational API + UI surface</text>

  <rect class="protected" x="950" y="560" width="220" height="102" rx="10" ry="10" />
  <text class="h2" x="1020" y="595">Grafana</text>
  <text class="small" x="978" y="619">InfluxDB-backed observability</text>

  <rect class="svc" x="360" y="560" width="225" height="102" rx="10" ry="10" />
  <text class="h2" x="406" y="595">nginx ingress</text>
  <text class="small" x="377" y="619">Ingress auth and routing layer</text>

  <rect class="public" x="360" y="710" width="320" height="72" rx="10" ry="10" />
  <text class="h2" x="393" y="742">Public-safe boundary</text>
  <text class="small" x="393" y="763">GET /public-health</text>

  <rect class="protected" x="710" y="710" width="530" height="72" rx="10" ry="10" />
  <text class="h2" x="740" y="742">Protected operational surfaces</text>
  <text class="small" x="740" y="763">API/dashboard routes and Grafana host routing behind auth</text>

  <rect class="note" x="24" y="170" width="210" height="100" rx="10" ry="10" />
  <text class="h2" x="43" y="203">Operator / user</text>
  <text class="small" x="43" y="226">Uses domain-based ingress</text>
  <text class="small" x="43" y="246">for public and protected paths</text>

  <rect class="note" x="24" y="304" width="210" height="108" rx="10" ry="10" />
  <text class="h2" x="43" y="338">Scope notes</text>
  <text class="small" x="43" y="361">Telemetry is software-simulated</text>
  <text class="small" x="43" y="381">Non-clinical/non-certified</text>
  <text class="small" x="43" y="401">Not fully hardened production</text>

  <line class="arrow" x1="234" y1="220" x2="360" y2="610" />

  <line class="arrow" x1="520" y1="294" x2="820" y2="294" />
  <text class="small" x="655" y="282">telemetry publish</text>

  <line class="arrow" x1="775" y1="274" x2="820" y2="274" />
  <text class="small" x="779" y="260">control-topic mapping bridge</text>

  <line class="arrow" x1="1025" y1="294" x2="1070" y2="294" />

  <line class="arrow" x1="1170" y1="338" x2="1138" y2="400" />
  <text class="small" x="1178" y="378">telemetry + alert-series</text>

  <line class="arrow" x1="1270" y1="310" x2="1290" y2="435" />
  <text class="small" x="1277" y="376">lifecycle/audit records</text>

  <line class="arrow" x1="885" y1="611" x2="1290" y2="463" />
  <text class="small" x="932" y="548">operational reads/updates</text>

  <line class="arrow" x1="1060" y1="560" x2="1132" y2="512" />
  <text class="small" x="1072" y="542">observability query</text>

  <line class="arrow" x1="585" y1="610" x2="650" y2="610" />
  <line class="arrow" x1="585" y1="590" x2="950" y2="590" />

  <line class="arrow dash" x1="472" y1="662" x2="520" y2="710" />
  <line class="arrow dash" x1="472" y1="662" x2="880" y2="710" />

  <text class="legend" x="24" y="875">Legend: green = public-safe route boundary; orange = protected operational surfaces; blue/purple = persistence stores; dashed outer box = runtime boundary.</text>
</svg>
